<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>療癒小葫蘆 ✨</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #1a1a2e;
    --bg2: #16213e;
    --card: #0f3460;
    --accent: #e94560;
    --text: #eaeaea;
    --chalk: #fffde7;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* 塗鴉背景紋理 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(255,100,100,0.05) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(100,100,255,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* 星星背景 */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    animation: twinkle var(--d, 3s) infinite alternate;
  }
  @keyframes twinkle {
    from { opacity: 0.1; transform: scale(0.8); }
    to   { opacity: 0.8; transform: scale(1.2); }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  /* 標題 */
  .title-area {
    text-align: center;
    padding-top: 10px;
  }
  .title-area h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 6vw, 3.5rem);
    color: var(--chalk);
    text-shadow:
      3px 3px 0 #333,
      -1px -1px 0 #333,
      1px -1px 0 #333,
      -1px 1px 0 #333;
    letter-spacing: 2px;
    line-height: 1.1;
  }
  .subtitle {
    font-size: 0.95rem;
    color: #aaa;
    margin-top: 6px;
    font-weight: 600;
  }

  /* 日期時間資訊 */
  .info-bar {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .info-chip {
    background: rgba(255,255,255,0.07);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 50px;
    padding: 6px 16px;
    font-size: 0.85rem;
    font-weight: 700;
    color: #ddd;
  }

  /* 角色選擇器 */
  .character-picker {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .char-btn {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: 3px solid #333;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
    outline: none;
    box-shadow: 0 3px 0 #000, inset 0 -3px 0 rgba(0,0,0,0.3);
  }
  .char-btn:hover { transform: translateY(-3px) scale(1.12); }
  .char-btn.active {
    box-shadow: 0 0 0 3px white, 0 3px 0 #000;
    transform: translateY(-3px) scale(1.12);
  }
  .char-btn span {
    position: absolute;
    bottom: -20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.65rem;
    font-weight: 800;
    color: #ccc;
    white-space: nowrap;
  }

  /* 主舞台 */
  .stage {
    width: 100%;
    max-width: 500px;
    background: rgba(255,255,255,0.04);
    border: 3px solid rgba(255,255,255,0.1);
    border-radius: 32px;
    padding: 30px 20px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    position: relative;
    overflow: hidden;
  }

  /* 角色SVG容器 */
  .gourd-container {
    position: relative;
    width: 180px;
    height: 220px;
    cursor: pointer;
  }
  .gourd-svg {
    width: 100%;
    height: 100%;
    animation: wobble 3s ease-in-out infinite;
    transform-origin: bottom center;
    filter: drop-shadow(0 8px 16px rgba(0,0,0,0.4));
  }
  .gourd-svg.walk-right {
    animation: walkRight 1s ease-in-out forwards;
  }
  .gourd-svg.walk-left {
    animation: walkLeft 1s ease-in-out forwards;
  }
  .gourd-svg.happy {
    animation: happy 0.6s ease-in-out 3;
  }
  .gourd-svg.thinking {
    animation: thinking 2s ease-in-out infinite;
  }

  @keyframes wobble {
    0%, 100% { transform: rotate(-3deg) translateY(0); }
    50% { transform: rotate(3deg) translateY(-8px); }
  }
  @keyframes walkRight {
    0%   { transform: translateX(0) rotate(0deg); }
    25%  { transform: translateX(30px) rotate(8deg); }
    50%  { transform: translateX(60px) rotate(-4deg); }
    75%  { transform: translateX(40px) rotate(6deg); }
    100% { transform: translateX(0) rotate(0deg); }
  }
  @keyframes walkLeft {
    0%   { transform: translateX(0) rotate(0deg) scaleX(1); }
    25%  { transform: translateX(-30px) rotate(-8deg) scaleX(-1); }
    50%  { transform: translateX(-60px) rotate(4deg) scaleX(-1); }
    75%  { transform: translateX(-40px) rotate(-6deg) scaleX(-1); }
    100% { transform: translateX(0) rotate(0deg) scaleX(1); }
  }
  @keyframes happy {
    0%, 100% { transform: scale(1) rotate(0deg); }
    25% { transform: scale(1.1) rotate(-5deg); }
    75% { transform: scale(1.1) rotate(5deg); }
  }
  @keyframes thinking {
    0%, 100% { transform: rotate(-2deg) translateY(0); }
    50% { transform: rotate(2deg) translateY(-5px); }
  }

  /* 對話泡泡 */
  .speech-bubble {
    background: white;
    color: #333;
    border-radius: 20px;
    padding: 16px 20px;
    font-size: 0.95rem;
    font-weight: 600;
    line-height: 1.6;
    width: 100%;
    position: relative;
    border: 3px solid #333;
    box-shadow: 4px 4px 0 #333;
    min-height: 80px;
    text-align: left;
  }
  .speech-bubble::before {
    content: '';
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    border: 9px solid transparent;
    border-bottom-color: #333;
  }
  .speech-bubble::after {
    content: '';
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    border: 7px solid transparent;
    border-bottom-color: white;
  }

  .loading-dots {
    display: flex;
    gap: 6px;
    justify-content: center;
    padding: 10px 0;
  }
  .loading-dots span {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #888;
    animation: dotBounce 1.2s infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotBounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
    40% { transform: translateY(-10px); opacity: 1; }
  }

  /* 塔羅牌顯示 */
  .tarot-card {
    display: none;
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    padding: 10px 16px;
    font-size: 0.82rem;
    color: #bbb;
    text-align: center;
    width: 100%;
  }
  .tarot-card.show { display: block; }
  .tarot-name {
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    color: #ffd54f;
    display: block;
    margin-bottom: 4px;
  }

  /* 小任務區 */
  .task-box {
    display: none;
    background: rgba(255,220,100,0.08);
    border: 2px dashed rgba(255,220,100,0.4);
    border-radius: 16px;
    padding: 14px 18px;
    width: 100%;
  }
  .task-box.show { display: block; }
  .task-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    color: #ffd54f;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .task-item {
    font-size: 0.87rem;
    color: #ddd;
    padding: 5px 0;
    display: flex;
    align-items: flex-start;
    gap: 8px;
    line-height: 1.5;
  }
  .task-item::before {
    content: '✦';
    color: #ffd54f;
    font-size: 0.75rem;
    margin-top: 3px;
    flex-shrink: 0;
  }

  /* 按鈕 */
  .btn-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    padding: 10px 24px;
    border-radius: 50px;
    border: 3px solid #333;
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.12s;
    box-shadow: 3px 3px 0 #000;
    letter-spacing: 0.5px;
    outline: none;
  }
  .btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 #000; }
  .btn-primary {
    background: #e94560;
    color: white;
  }
  .btn-primary:hover { transform: translate(-2px, -2px); box-shadow: 5px 5px 0 #000; }
  .btn-secondary {
    background: #ffd54f;
    color: #333;
  }
  .btn-secondary:hover { transform: translate(-2px, -2px); box-shadow: 5px 5px 0 #000; }
  .btn-ghost {
    background: transparent;
    color: #ddd;
    border-color: #555;
    box-shadow: 2px 2px 0 #222;
  }
  .btn-ghost:hover { transform: translate(-1px, -1px); box-shadow: 3px 3px 0 #222; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; box-shadow: 3px 3px 0 #000 !important; }

  /* 脈輪說明 */
  .chakra-legend {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    font-size: 0.78rem;
    color: #999;
  }
  .chakra-item {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .chakra-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
  }

  /* Footer */
  .footer {
    font-size: 0.78rem;
    color: #555;
    text-align: center;
    padding-bottom: 20px;
  }

  /* 表情覆蓋 */
  .expression-tag {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(0,0,0,0.5);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 0.75rem;
    color: #ddd;
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="container">

  <div class="title-area">
    <h1>✨ 療癒小葫蘆 ✨</h1>
    <div class="subtitle">每日療癒 × 塔羅智慧 × 脈輪能量</div>
  </div>

  <div class="info-bar" id="infoBar">
    <div class="info-chip" id="chipDate">📅 讀取中…</div>
    <div class="info-chip" id="chipWeek">🗓 --</div>
    <div class="info-chip" id="chipTime">🕐 --</div>
  </div>

  <div style="height: 28px; margin-bottom: -8px;"><!-- space for labels --></div>
  <div class="character-picker" id="charPicker"></div>

  <div class="stage">
    <span class="expression-tag" id="expressionTag">😊 開心</span>
    <div class="gourd-container" id="gourdContainer" onclick="triggerWalk()" title="點我走路！">

        <!-- 葫蘆主體：下半部（大） -->
        <ellipse cx="90" cy="160" rx="60" ry="55" fill="#ff6b6b" stroke="#222" stroke-width="4"/>
        <!-- 葫蘆主體：上半部（小） -->
        <ellipse cx="90" cy="88" rx="40" ry="38" fill="#ff6b6b" stroke="#222" stroke-width="4"/>
        <!-- 腰部連接 -->
        <rect x="72" y="118" width="36" height="18" rx="8" fill="#ff6b6b" stroke="#222" stroke-width="3"/>
        <!-- 高光下 -->
        <ellipse cx="75" cy="148" rx="16" ry="20" fill="rgba(255,255,255,0.18)"/>
        <!-- 高光上 -->
        <ellipse cx="78" cy="80" rx="10" ry="12" fill="rgba(255,255,255,0.2)"/>
        <!-- 頂部藤蔓 -->
        <path d="M90 50 Q100 30 115 25 Q120 20 118 15" stroke="#5d4037" stroke-width="3" fill="none" stroke-linecap="round"/>
        <ellipse cx="118" cy="13" rx="5" ry="4" fill="#388e3c" stroke="#222" stroke-width="2"/>
        <!-- 葉子 -->
        <ellipse cx="108" cy="20" rx="10" ry="5" fill="#66bb6a" stroke="#222" stroke-width="2" transform="rotate(-30 108 20)"/>
        <!-- 眼睛（id可替換） -->
        <g id="eyes">
          <circle cx="80" cy="88" r="8" fill="white" stroke="#222" stroke-width="2.5"/>
          <circle cx="100" cy="88" r="8" fill="white" stroke="#222" stroke-width="2.5"/>
          <circle cx="82" cy="89" r="4" fill="#222"/>
          <circle cx="102" cy="89" r="4" fill="#222"/>
          <!-- 眼神高光 -->
          <circle cx="84" cy="87" r="1.5" fill="white"/>
          <circle cx="104" cy="87" r="1.5" fill="white"/>
        </g>
        <!-- 嘴巴 -->
        <path id="mouth" d="M82 100 Q90 108 98 100" stroke="#222" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <!-- 腮紅 -->
        <ellipse cx="70" cy="97" rx="8" ry="5" fill="rgba(255,100,120,0.35)"/>
        <ellipse cx="110" cy="97" rx="8" ry="5" fill="rgba(255,100,120,0.35)"/>
        <!-- 小手（裝飾） -->
        <ellipse cx="40" cy="140" rx="12" ry="8" fill="#ff6b6b" stroke="#222" stroke-width="3" transform="rotate(30 40 140)"/>
        <ellipse cx="140" cy="140" rx="12" ry="8" fill="#ff6b6b" stroke="#222" stroke-width="3" transform="rotate(-30 140 140)"/>
        <!-- 小腳 -->
        <ellipse cx="72" cy="210" rx="14" ry="8" fill="#ff6b6b" stroke="#222" stroke-width="3"/>
        <ellipse cx="108" cy="210" rx="14" ry="8" fill="#ff6b6b" stroke="#222" stroke-width="3"/>
      </svg>
    </div>

    <div class="speech-bubble" id="speechBubble">
      <div class="loading-dots" id="loadingDots">
        <span></span><span></span><span></span>
      </div>
      <div id="messageText" style="display:none;"></div>
    </div>

    <div class="tarot-card" id="tarotCard">
      <span class="tarot-name" id="tarotName"></span>
      <span id="tarotDesc"></span>
    </div>

    <div class="task-box" id="taskBox">
      <div class="task-title">🌟 今日小任務</div>
      <div id="taskList"></div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="askBtn" onclick="fetchMessage()">✨ 給我療癒話語</button>
      <button class="btn btn-ghost" onclick="triggerWalk()">🚶 溜達一下</button>
    </div>
  </div>

  <div class="chakra-legend" id="chakraLegend"></div>

  <div class="footer">點擊小葫蘆讓她走路 · 每次都有不同的塔羅智慧 💫</div>
</div>

<script>
// ============ 資料設定 ============
const CHAKRA_CHARS = [
  { id: 0, name: '根輪', label: '紅·根輪', color: '#e53935', darkColor: '#b71c1c', chakra: '根輪 — 安全感與大地連結' },
  { id: 1, name: '臍輪', label: '橙·臍輪', color: '#fb8c00', darkColor: '#e65100', chakra: '臍輪 — 創造力與情感流動' },
  { id: 2, name: '太陽輪', label: '黃·太陽輪', color: '#fdd835', darkColor: '#f9a825', chakra: '太陽輪 — 自信與意志力' },
  { id: 3, name: '心輪', label: '綠·心輪', color: '#43a047', darkColor: '#1b5e20', chakra: '心輪 — 愛與慈悲' },
  { id: 4, name: '喉輪', label: '藍·喉輪', color: '#1e88e5', darkColor: '#0d47a1', chakra: '喉輪 — 溝通與表達' },
  { id: 5, name: '眉心輪', label: '靛·眉心輪', color: '#5e35b1', darkColor: '#311b92', chakra: '眉心輪 — 直覺與智慧' },
  { id: 6, name: '頂輪', label: '紫·頂輪', color: '#8e24aa', darkColor: '#4a148c', chakra: '頂輪 — 靈性與宇宙連結' },
  { id: 7, name: '純粹', label: '白·純粹', color: '#f5f5f5', darkColor: '#bdbdbd', chakra: '白色 — 純淨、整合與全然接納' },
];

const TAROT_DECK = [
  { name: '愚者', eng: 'The Fool', meaning: '新開始，純真的勇氣，放下恐懼踏上旅程' },
  { name: '魔術師', eng: 'The Magician', meaning: '你擁有所需的一切工具，相信自己的能力' },
  { name: '女祭司', eng: 'The High Priestess', meaning: '聆聽內在聲音，直覺正引導著你' },
  { name: '女皇', eng: 'The Empress', meaning: '豐盛、滋養與美好，允許自己被照顧' },
  { name: '皇帝', eng: 'The Emperor', meaning: '穩定的結構給你支撐，你可以依靠自己' },
  { name: '教皇', eng: 'The Hierophant', meaning: '智慧的傳承，找尋你信賴的引導' },
  { name: '戀人', eng: 'The Lovers', meaning: '做出符合真心的選擇，愛自己是一切的根基' },
  { name: '戰車', eng: 'The Chariot', meaning: '保持方向，勝利需要內在的整合與決心' },
  { name: '力量', eng: 'Strength', meaning: '溫柔即是力量，用慈悲面對內心的恐懼' },
  { name: '隱士', eng: 'The Hermit', meaning: '你需要的答案就在自己內心深處' },
  { name: '命運之輪', eng: 'Wheel of Fortune', meaning: '一切都在流動，好的改變正在展開' },
  { name: '正義', eng: 'Justice', meaning: '誠實面對自己，平衡帶來內心的安寧' },
  { name: '倒吊人', eng: 'The Hanged Man', meaning: '換個角度看，等待也是一種智慧' },
  { name: '死神', eng: 'Death', meaning: '轉化的時刻，舊的結束讓新的得以生長' },
  { name: '節制', eng: 'Temperance', meaning: '緩緩來，合適的節奏讓能量流動得最美' },
  { name: '惡魔', eng: 'The Devil', meaning: '看見束縛你的執念，自由比你想的更近' },
  { name: '高塔', eng: 'The Tower', meaning: '震盪之後有清明，真實的才能留下' },
  { name: '星星', eng: 'The Star', meaning: '希望永遠都在，你值得被宇宙眷顧' },
  { name: '月亮', eng: 'The Moon', meaning: '感受真實的情緒，黑暗中也有月光照路' },
  { name: '太陽', eng: 'The Sun', meaning: '喜悅與光明正在你身邊，展開雙臂迎接' },
  { name: '審判', eng: 'Judgement', meaning: '呼喚靈魂深處的自己，覺醒的時刻已到' },
  { name: '世界', eng: 'The World', meaning: '圓滿完成，你已走了很長的路，好好慶祝' },
];

const WEEK_ZH = ['日','一','二','三','四','五','六'];
const WEEK_ENG = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

// ============ 狀態 ============
let currentChar = 0; // 依日期隨機選
let isLoading = false;
let currentTarot = null;
let walkDir = 1;

// ============ 初始化 ============
function init() {
  // 星星背景
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 3 + 1;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      background:${['#fff','#ffd54f','#e3f2fd','#f8bbd0'][Math.floor(Math.random()*4)]};
      --d:${(Math.random()*3+1.5).toFixed(1)}s;
      animation-delay:${(Math.random()*3).toFixed(1)}s;
    `;
    starsEl.appendChild(s);
  }

  // 根據日期決定初始角色
  const now = new Date();
  const seed = now.getDate() + now.getMonth() * 31 + now.getMinutes();
  currentChar = seed % 8;

  // 更新日期時間
  updateInfo();
  setInterval(updateInfo, 30000);

  // 渲染角色選擇器
  renderPicker();

  // 渲染脈輪圖例
  renderLegend();

  // 套用初始角色顏色
  applyCharacter(currentChar);

  // 初始畫面：顯示等待狀態
  showWaiting();
}

function updateInfo() {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth()+1, d = now.getDate();
  const w = now.getDay();
  const h = String(now.getHours()).padStart(2,'0');
  const mi = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('chipDate').textContent = `📅 ${y}/${String(m).padStart(2,'0')}/${String(d).padStart(2,'0')}`;
  document.getElementById('chipWeek').textContent = `🗓 星期${WEEK_ZH[w]}`;
  document.getElementById('chipTime').textContent = `🕐 ${h}:${mi}`;
}

function renderPicker() {
  const picker = document.getElementById('charPicker');
  picker.innerHTML = '';
  CHAKRA_CHARS.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'char-btn' + (i === currentChar ? ' active' : '');
    btn.style.background = `radial-gradient(circle at 35% 35%, ${lighten(c.color)}, ${c.color})`;
    btn.title = c.label;
    btn.onclick = () => selectChar(i);
    const label = document.createElement('span');
    label.textContent = c.name;
    btn.appendChild(label);
    picker.appendChild(btn);
  });
}

function lighten(hex) {
  // simple lighten
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,r+60)},${Math.min(255,g+60)},${Math.min(255,b+60)})`;
}

function renderLegend() {
  const leg = document.getElementById('chakraLegend');
  leg.innerHTML = CHAKRA_CHARS.map(c => `
    <div class="chakra-item">
      <div class="chakra-dot" style="background:${c.color}"></div>
      ${c.name}
    </div>
  `).join('');
}

function selectChar(idx) {
  currentChar = idx;
  document.querySelectorAll('.char-btn').forEach((b,i) => {
    b.classList.toggle('active', i === idx);
  });
  applyCharacter(idx);
  triggerHappy();
}

function applyCharacter(idx) {
  const c = CHAKRA_CHARS[idx];
  // 更新所有葫蘆填色
  const svg = document.getElementById('gourdSvg');
  svg.querySelectorAll('ellipse, rect').forEach(el => {
    if (el.getAttribute('fill') && !el.getAttribute('fill').startsWith('rgba') &&
        el.getAttribute('fill') !== 'white' && el.getAttribute('fill') !== '#222' &&
        !el.getAttribute('fill').startsWith('rgb(255') &&
        el.id !== 'eyes') {
      // 只改主體色
    }
  });

  // 重新渲染SVG色彩
  recolorGourd(idx);
}

function recolorGourd(idx) {
  const c = CHAKRA_CHARS[idx];
  const mainColor = c.color;
  const isWhite = idx === 7;
  const eyeColor = isWhite ? '#9c27b0' : '#222';
  const strokeColor = isWhite ? '#9e9e9e' : '#222';
  const blushColor = isWhite ? 'rgba(180,130,200,0.35)' : 'rgba(255,100,120,0.35)';

  document.getElementById('gourdSvg').innerHTML = `
    <ellipse cx="90" cy="160" rx="60" ry="55" fill="${mainColor}" stroke="${strokeColor}" stroke-width="4"/>
    <ellipse cx="90" cy="88" rx="40" ry="38" fill="${mainColor}" stroke="${strokeColor}" stroke-width="4"/>
    <rect x="72" y="118" width="36" height="18" rx="8" fill="${mainColor}" stroke="${strokeColor}" stroke-width="3"/>
    <ellipse cx="75" cy="148" rx="16" ry="20" fill="rgba(255,255,255,0.18)"/>
    <ellipse cx="78" cy="80" rx="10" ry="12" fill="rgba(255,255,255,0.2)"/>
    <path d="M90 50 Q100 30 115 25 Q120 20 118 15" stroke="#5d4037" stroke-width="3" fill="none" stroke-linecap="round"/>
    <ellipse cx="118" cy="13" rx="5" ry="4" fill="#388e3c" stroke="${strokeColor}" stroke-width="2"/>
    <ellipse cx="108" cy="20" rx="10" ry="5" fill="#66bb6a" stroke="${strokeColor}" stroke-width="2" transform="rotate(-30 108 20)"/>
    <g id="eyes">
      <circle cx="80" cy="88" r="8" fill="white" stroke="${strokeColor}" stroke-width="2.5"/>
      <circle cx="100" cy="88" r="8" fill="white" stroke="${strokeColor}" stroke-width="2.5"/>
      <circle cx="82" cy="89" r="4" fill="${eyeColor}"/>
      <circle cx="102" cy="89" r="4" fill="${eyeColor}"/>
      <circle cx="84" cy="87" r="1.5" fill="white"/>
      <circle cx="104" cy="87" r="1.5" fill="white"/>
    </g>
    <path id="mouth" d="M82 100 Q90 108 98 100" stroke="${strokeColor}" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="70" cy="97" rx="8" ry="5" fill="${blushColor}"/>
    <ellipse cx="110" cy="97" rx="8" ry="5" fill="${blushColor}"/>
    <ellipse cx="40" cy="140" rx="12" ry="8" fill="${mainColor}" stroke="${strokeColor}" stroke-width="3" transform="rotate(30 40 140)"/>
    <ellipse cx="140" cy="140" rx="12" ry="8" fill="${mainColor}" stroke="${strokeColor}" stroke-width="3" transform="rotate(-30 140 140)"/>
    <ellipse cx="72" cy="210" rx="14" ry="8" fill="${mainColor}" stroke="${strokeColor}" stroke-width="3"/>
    <ellipse cx="108" cy="210" rx="14" ry="8" fill="${mainColor}" stroke="${strokeColor}" stroke-width="3"/>
  `;
}

// ============ 動畫 ============
function triggerWalk() {
  const svg = document.getElementById('gourdSvg');
  svg.classList.remove('walk-right','walk-left','happy','thinking');
  void svg.offsetWidth;
  svg.classList.add(walkDir > 0 ? 'walk-right' : 'walk-left');
  walkDir *= -1;
  document.getElementById('expressionTag').textContent = '🚶 漫步中';
  setTimeout(() => {
    svg.classList.remove('walk-right','walk-left');
    document.getElementById('expressionTag').textContent = '😊 開心';
  }, 1100);
}

function triggerHappy() {
  const svg = document.getElementById('gourdSvg');
  svg.classList.remove('walk-right','walk-left','happy','thinking');
  void svg.offsetWidth;
  svg.classList.add('happy');
  document.getElementById('expressionTag').textContent = '✨ 開心';
  setTimeout(() => svg.classList.remove('happy'), 2000);
}

function triggerThinking() {
  const svg = document.getElementById('gourdSvg');
  svg.classList.remove('walk-right','walk-left','happy','thinking');
  void svg.offsetWidth;
  svg.classList.add('thinking');
  document.getElementById('expressionTag').textContent = '🤔 思考中…';
}

// ============ 顯示狀態 ============
function showWaiting() {
  document.getElementById('loadingDots').style.display = 'none';
  document.getElementById('messageText').style.display = 'block';
  document.getElementById('messageText').textContent = '嗨！按下「給我療癒話語」，讓我為你今天抽一張塔羅牌，傳遞宇宙給你的訊息 💫';
  document.getElementById('tarotCard').classList.remove('show');
  document.getElementById('taskBox').classList.remove('show');
}

function showLoading() {
  document.getElementById('loadingDots').style.display = 'flex';
  document.getElementById('messageText').style.display = 'none';
  document.getElementById('tarotCard').classList.remove('show');
  document.getElementById('taskBox').classList.remove('show');
}

function showResult(message, tarot, tasks) {
  document.getElementById('loadingDots').style.display = 'none';
  document.getElementById('messageText').style.display = 'block';
  document.getElementById('messageText').textContent = message;

  if (tarot) {
    document.getElementById('tarotName').textContent = `🃏 ${tarot.name}（${tarot.eng}）`;
    document.getElementById('tarotDesc').textContent = tarot.meaning;
    document.getElementById('tarotCard').classList.add('show');
  }

  if (tasks && tasks.length) {
    const taskList = document.getElementById('taskList');
    taskList.innerHTML = tasks.map(t => `<div class="task-item">${t}</div>`).join('');
    document.getElementById('taskBox').classList.add('show');
  }
}

// ============ 抽牌 + API ============
function drawTarot(seed) {
  // 加入更多隨機性
  const idx = seed % TAROT_DECK.length;
  return TAROT_DECK[idx];
}

async function fetchMessage() {
  if (isLoading) return;
  isLoading = true;
  const btn = document.getElementById('askBtn');
  btn.disabled = true;

  const now = new Date();
  const seed = now.getDate() * 31 + now.getMonth() * 7 + now.getMinutes() + now.getHours() * 13 + currentChar * 17;
  currentTarot = drawTarot(seed);

  showLoading();
  triggerThinking();

  const charInfo = CHAKRA_CHARS[currentChar];
  const weekDay = WEEK_ZH[now.getDay()];
  const weekEng = WEEK_ENG[now.getDay()];
  const hour = now.getHours();
  const minute = now.getMinutes();

  // 時段描述
  let timeDesc = '';
  if (hour < 6) timeDesc = '凌晨，深夜的靜謐時刻';
  else if (hour < 9) timeDesc = '早晨，一天的開始';
  else if (hour < 12) timeDesc = '上午，陽光正好';
  else if (hour < 14) timeDesc = '中午，能量的中點';
  else if (hour < 17) timeDesc = '下午，繼續前行';
  else if (hour < 20) timeDesc = '傍晚，收穫的時刻';
  else timeDesc = '夜晚，放鬆與整理';

  const prompt = `你是一位溫柔療癒的小葫蘆精靈，代表「${charInfo.chakra}」的能量。
今天是星期${weekDay}（${weekEng}），${timeDesc}（${String(hour).padStart(2,'0')}:${String(minute).padStart(2,'0')}）。
今日抽到的塔羅牌是「${currentTarot.name}」（${currentTarot.eng}），牌義：${currentTarot.meaning}。

請你根據以上資訊，用繁體中文寫出：
1. 一段療癒溫暖的話語（3-5句，融合塔羅牌意、${charInfo.chakra}的能量、以及當下的時間氛圍）
2. 今日3個具體可行的小任務（每個15字以內）

請用以下JSON格式回覆，不要有其他文字：
{
  "message": "療癒話語...",
  "tasks": ["小任務1", "小任務2", "小任務3"]
}`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await resp.json();
    const raw = data.content?.map(b => b.text || '').join('');
    const clean = raw.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    showResult(parsed.message, currentTarot, parsed.tasks);
    triggerHappy();
    document.getElementById('expressionTag').textContent = '💗 療癒中';
  } catch (e) {
    // 備用離線訊息
    const fallback = [
      `星期${weekDay}，宇宙透過「${currentTarot.name}」傳遞給你一個訊息：${currentTarot.meaning}。此刻的你，已經做得夠好了。讓${charInfo.name}的能量輕輕包裹著你，溫柔的前行吧 💛`,
      `在這個${timeDesc}，「${currentTarot.name}」提醒你：${currentTarot.meaning}。你不需要完美，只需要真實。${charInfo.chakra}的能量在此刻滋養著你 🌟`,
    ];
    const fallbackTasks = ['深呼吸三次，感受當下', '給自己一個微笑', '喝一杯溫水，好好休息'];
    showResult(fallback[Math.floor(Math.random()*fallback.length)], currentTarot, fallbackTasks);
    triggerHappy();
  }

  isLoading = false;
  btn.disabled = false;
}

// ============ 啟動 ============
init();
</script>
